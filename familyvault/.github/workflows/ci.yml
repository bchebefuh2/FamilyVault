name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run all tests ────────────────────────────────────────────────────
  test:
    name: Test (Java 17)
    runs-on: ubuntu-latest

    # Spin up real Postgres + Redis so integration tests can hit them
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: familyvault_test
          POSTGRES_USER: fvuser
          POSTGRES_PASSWORD: fvpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'   # caches ~/.m2 between runs — speeds up pipeline

      - name: Run tests
        working-directory: familyvault-api
        run: mvn test --batch-mode
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/familyvault_test
          SPRING_DATASOURCE_USERNAME: fvuser
          SPRING_DATASOURCE_PASSWORD: fvpassword
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          # Test-only secret — safe to have here, never use in production
          JWT_SECRET: dGVzdC1vbmx5LXNlY3JldC1rZXktZm9yLWdpdGh1Yi1hY3Rpb25zLXBpcGVsaW5l

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()   # show the report even when tests fail
        with:
          name: JUnit Test Results
          path: familyvault-api/target/surefire-reports/*.xml
          reporter: java-junit

  # ── Job 2: Build the JAR ────────────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test    # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR (skip tests — already ran above)
        working-directory: familyvault-api
        run: mvn package -DskipTests --batch-mode

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: familyvault-api-${{ github.sha }}
          path: familyvault-api/target/*.jar
          retention-days: 7

  # ── Job 3: Build Docker image (validates Dockerfile is valid) ──────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PRs — just validates it builds)
        uses: docker/build-push-action@v5
        with:
          context: familyvault-api
          push: false
          tags: familyvault-api:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
