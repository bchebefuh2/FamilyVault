spring:
  application:
    name: familyvault-api

  datasource:
    url: jdbc:postgresql://localhost:5432/familyvault
    username: fvuser
    password: fvpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate      # Flyway manages the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  async:
    executor:
      core-pool-size: 2
      max-pool-size: 4

# ─── JWT ───────────────────────────────────────────────────────────────────
# IMPORTANT: Replace this with a strong 256-bit Base64-encoded secret before deploying.
# Generate one with: openssl rand -base64 64
jwt:
  secret: dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1mYW1pbHl2YXVsdC1kZXYtb25seQ==
  access-token-expiry: 900000   # 15 minutes in ms
  refresh-token-ttl-days: 7

# ─── Local File Storage ────────────────────────────────────────────────────
# Phase 1: files saved to disk. Phase 2: swap FileStorageService for S3.
storage:
  local:
    path: uploads

# ─── Server ────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always

# ─── OpenAPI / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ─── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.familyvault: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
