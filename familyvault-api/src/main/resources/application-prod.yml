# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900000
  refresh-token-ttl-days: 7

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.familyvault: INFO
    org.springframework.security: WARN
    software.amazon.awssdk: WARN
