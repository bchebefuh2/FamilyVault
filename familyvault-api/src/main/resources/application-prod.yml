# ── application-prod.yml ──────────────────────────────────────────────────────
# Production overrides. Activated with: -Dspring.profiles.active=prod
# All secrets come from AWS Secrets Manager — nothing sensitive is here.

spring:
  datasource:
    # Values injected at runtime from Secrets Manager via spring-cloud-aws
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      ssl-mode: require   # enforced by RDS parameter group too

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: true    # ElastiCache transit encryption

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

