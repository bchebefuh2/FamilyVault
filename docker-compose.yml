version: '3.8'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: familyvault-postgres
    environment:
      POSTGRES_DB: familyvault
      POSTGRES_USER: fvuser
      POSTGRES_PASSWORD: fvpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fvuser -d familyvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: familyvault-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot API ───────────────────────────────────────────────────────
  # Uncomment after running: mvn package -DskipTests
  # api:
  #   build: .
  #   container_name: familyvault-api
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familyvault
  #     SPRING_DATASOURCE_USERNAME: fvuser
  #     SPRING_DATASOURCE_PASSWORD: fvpassword
  #     SPRING_REDIS_HOST: redis
  #     JWT_SECRET: ${JWT_SECRET}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
