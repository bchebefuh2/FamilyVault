name: CD — Build & Push to AWS ECR

# Only deploy when code lands on main (i.e. a PR is merged)
on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: familyvault-api

jobs:
  # ── Build, tag, and push Docker image to ECR ───────────────────────────────
  deploy:
    name: Push to ECR
    runs-on: ubuntu-latest

    # These permissions allow the job to request an OIDC token (more secure than long-lived keys)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: familyvault-api
        run: mvn package -DskipTests --batch-mode

      # ── AWS Authentication ─────────────────────────────────────────────────
      # Using OIDC (recommended) — no long-lived AWS keys stored in GitHub
      # Requires a one-time setup of an IAM OIDC provider in your AWS account.
      # See: https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker Build & Push ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: familyvault-api
          push: true
          # Tag with both the git SHA (immutable) and "latest" (floating)
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Write deployment summary
        run: |
          echo "## 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY

      # ── Phase 4 placeholder: deploy to Elastic Beanstalk ──────────────────
      # Uncomment this step after completing Phase 4 (Terraform + AWS setup)
      #
      # - name: Deploy to Elastic Beanstalk
      #   run: |
      #     aws elasticbeanstalk create-application-version \
      #       --application-name familyvault \
      #       --version-label ${{ github.sha }} \
      #       --source-bundle S3Bucket="${{ secrets.EB_BUCKET }}",S3Key="familyvault-${{ github.sha }}.zip"
      #     aws elasticbeanstalk update-environment \
      #       --environment-name familyvault-prod \
      #       --version-label ${{ github.sha }}

# ── GitHub Secrets required ────────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   AWS_ROLE_ARN     — ARN of the IAM role GitHub can assume via OIDC
#                      e.g. arn:aws:iam::123456789012:role/github-actions-familyvault
#
# (Phase 4 adds more secrets for RDS, Redis, KMS, etc.)
